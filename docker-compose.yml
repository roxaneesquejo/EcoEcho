version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: ecoecho-postgres
    environment:
      POSTGRES_USER: eco_admin
      POSTGRES_PASSWORD: eco_password
      POSTGRES_DB: ecoecho_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ecoecho-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: